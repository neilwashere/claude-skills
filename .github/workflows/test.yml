name: tests
on:
  pull_request:
  push:
    branches: [main]
jobs:
  bash-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure jq
        run: jq --version || (sudo apt-get update && sudo apt-get install -y jq)
      - name: Run resolver tests
        run: bash tests/run.sh
      - name: Lint with shellcheck
        run: |
          # Pin shellcheck to 0.11.0 (apt-get installs 0.9.0 on ubuntu-latest,
          # which lacks SC2329 and emits SC2317 instead).
          SHELLCHECK_VERSION=0.11.0
          if ! shellcheck --version 2>/dev/null | grep -q "$SHELLCHECK_VERSION"; then
            curl -sSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
              | tar -xJ -C /tmp
            sudo cp /tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck /usr/local/bin/
          fi
          shellcheck --version
          find . -name '*.sh' -print0 | xargs -0 shellcheck
